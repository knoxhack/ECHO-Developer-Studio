name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-beta*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional release tag (defaults to package.json version).'
        required: false
        type: string

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      channel: ${{ steps.metadata.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - id: metadata
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ -n "${{ github.event_name }}" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            OVERRIDE='${{ github.event.inputs.tag }}'
            if [ -n "$OVERRIDE" ]; then
              TAG="$OVERRIDE"
            fi
          fi

          if [ -z "$TAG" ] || [ "$TAG" = "main" ] || [ "$TAG" = "" ]; then
            TAG="v$(node -p \"require('./package.json').version\")"
          fi

          if ! [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)(-beta\.[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format: $TAG"
            exit 1
          fi

          PKG_VERSION="v$(node -p \"require('./package.json').version\")"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "Tag/version mismatch: tag=$TAG package=$PKG_VERSION"
            exit 1
          fi

          CHANNEL="stable"
          if [[ "$TAG" == *-beta.* ]]; then
            CHANNEL="beta"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"

  release:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build and publish ${{ matrix.platform }} release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_UPDATE_CHANNEL: ${{ needs.validate.outputs.channel }}
        run: |
          npm run dist:publish:public

      - name: Validate release assets
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d release ]; then
            echo "release directory missing"
            exit 1
          fi

          if [ ! -f release/latest.yml ] && [ ! -f release/latest-linux.yml ]; then
            echo "Expected updater manifest missing"
            exit 1
          fi

          if [ ! -f release/SHA256SUMS-$PLATFORM.txt ]; then
            :
          fi

          FILE_COUNT=0
          for f in release/*; do
            if [ -f "$f" ] && [ "${f##*/}" != "SHA256SUMS-$PLATFORM.txt" ]; then
              FILE_COUNT=$((FILE_COUNT + 1))
            fi
          done

          if [ "$FILE_COUNT" -lt 1 ]; then
            echo "No release artifacts found"
            exit 1
          fi

          sha256sum release/* > "release/SHA256SUMS-${{ matrix.platform }}.txt"
        env:
          PLATFORM: ${{ matrix.platform }}

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ needs.validate.outputs.tag }}" > /dev/null 2>&1; then
            gh release create "${{ needs.validate.outputs.tag }}" --title "${{ needs.validate.outputs.tag }}" --generate-notes
          fi

      - name: Upload platform checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.validate.outputs.tag }}" "release/SHA256SUMS-${{ matrix.platform }}.txt" --clobber
